<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="navbar-placeholder"></div>
    <script src="navbarLoader.js"></script>

    <div class="search-container">
        <h2>Rezervasyon Yapın</h2>
        <div class="search-form">
            <!-- Arama Kutusu -->
            <input type="text" placeholder="İstediğiniz şehri veya bölgeyi aratınız">

            <!-- Kişi Sayısı -->
            <select>
                <option value="1">1 Kişi</option>
                <option value="2">2 Kişi</option>
                <option value="3">3 Kişi</option>
                <option value="4">4 Kişi</option>
                <option value="5">5+ Kişi</option>
            </select>

            <!-- Gidiş ve Dönüş Tarihi -->
            <div class="dates-container">
                <input type="date">
                <input type="date">
            </div>

            <!-- Rezervasyon Butonu -->
            <button>Arama Yap</button>
        </div>
    </div>


    <div class="custom-container">
        <div class="row">
            <!-- Filtre Bölümü -->
            <div class="col-md-3 filter-section">
                <h4>Filtrele</h4>
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label>
                            Fiyat Aralığı:
                            <span id="priceRangeValue">0₺ - 1000₺</span>
                        </label>
                        <input type="range" class="form-control-range" id="priceMin" min="0" max="1000" step="10"
                            value="0" />
                        <input type="range" class="form-control-range mt-2" id="priceMax" min="0" max="1000" step="10"
                            value="1000" />
                    </div>
                    <div class="form-group">
                        <label for="dateRange">Tarih Aralığı</label>
                        <input type="date" class="form-control" id="dateRangeStart" />
                        <input type="date" class="form-control mt-2" id="dateRangeEnd" />
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        Filtrele
                    </button>
                </form>
            </div>

            <!-- İlanlar Bölümü -->
            <div class="col-md-9">
                <div class="row" id="adsContainer">
                    <div class="col-md-4 mb-4" data-price="500">
                        <div class="card custom-card shadow-sm position-relative">
                            <img src="https://picsum.photos/400/250?random=3" class="card-img-top" alt="İlan Görseli" />

                            <div class="card-body">
                                <h5 class="card-title mb-0">Şehir Merkezinde Stüdyo</h5>
                                <br><br>
                                <div class="card-img-overlay-price">₺500 / gece</div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4 mb-4" data-price="500">
                        <div class="card custom-card shadow-sm position-relative">
                            <img src="https://picsum.photos/400/250?random=3" class="card-img-top" alt="İlan Görseli" />

                            <div class="card-body">
                                <h5 class="card-title mb-0">Şehir Merkezinde Stüdyo</h5>
                                <br><br>
                                <div class="card-img-overlay-price">₺500 / gece</div>
                            </div>
                        </div>
                    </div>

                    <!-- Diğer kartlar... -->
                </div>
            </div>
        </div>
    </div>

    <!-- Script’i body sonuna taşıyoruz -->
    <script>
        const minInput = document.getElementById("priceMin");
        const maxInput = document.getElementById("priceMax");
        const valueLabel = document.getElementById("priceRangeValue");

        function updateLabel() {
            let min = parseInt(minInput.value);
            let max = parseInt(maxInput.value);
            if (min > max) {
                max = min;
                maxInput.value = max;
            }
            valueLabel.innerText = `${min}₺ - ${max}₺`;

            // Filtreleme
            document.querySelectorAll("#adsContainer [data-price]").forEach((col) => {
                const price = parseInt(col.getAttribute("data-price"));
                if (price >= min && price <= max) {
                    col.classList.remove("d-none");
                } else {
                    col.classList.add("d-none");
                }
            });
        }

        minInput.addEventListener("input", updateLabel);
        maxInput.addEventListener("input", updateLabel);
        updateLabel(); // Sayfa yüklendiğinde uygula
    </script>



    <div id="footer-container" class="footer-custom"></div>
    <script src="footerLoader.js"></script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
