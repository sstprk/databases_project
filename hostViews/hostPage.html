<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cabinly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <div id="navbar-placeholder"></div>
  <script src="hostNavbarLoader.js"></script>

  <div class="custom-container">
    <div class="row">
      <!-- Sol Menü -->
      <div class="col-md-3 sidebarS">
        <button class="btn-login" onclick="loadContent('myAds')">İlanlarım</button>
        <button class="btn-login" onclick="loadContent('activeReservations')">Aktif Rezervasyonlarım</button>
        <button class="btn-login" onclick="loadContent('reservationHistory')">Geçmiş Rezervasyonlarım</button>
        <button class="btn-login" onclick="loadContent('newAd')">Yeni İlan Ver </button>
        <button class="btn-login" onclick="loadContent('settings')">Ayarlar</button>
        <button class="btn-login" id="btn-quit">Çıkış Yap</button>

      </div>


      <!-- Sağ İçerik Alanı -->
      <div class="col-md-9 content-areaS" id="icerik">
        <h4>Hoşgeldiniz!</h4>
        <p>Sol menüden bir seçenek seçiniz.</p>
      </div>
    </div>
  </div>

  <div id="footer-container" class="footer-custom"></div>
  <script src="hostFooterLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function loadContent(secim) {
      const icerik = document.getElementById('icerik');
      // secim değerine göre dosya adını belirleyen bir obje
      const partialMap = {
        newAd:'newAd.html',
        myAds: 'myAds.html',
        activeReservations: 'activeReservations.html',
        reservationHistory: 'reservationHistory.html',
        settings: 'settings.html'
      };
  
      const fileName = partialMap[secim];
      if (!fileName) {
        icerik.innerHTML = `<div class="alert alert-warning">Böyle bir bölüm bulunamadı.</div>`;
        return;
      }
  
      fetch(`partials/${fileName}`)
        .then(res => {
          if (!res.ok) throw new Error(`"${fileName}" yüklenemedi (HTTP ${res.status})`);
          return res.text();
        })
        .then(html => {
          icerik.innerHTML = html;
        })
        .catch(err => {
          icerik.innerHTML = `
            <div class="alert alert-danger">
              İçerik yüklenirken hata oluştu: ${err.message}
            </div>
          `;
        });
    }
  
    // İstersen sayfa açılırken bir bölüm yüklensin:
    document.addEventListener('DOMContentLoaded', () => loadContent('myAds'));
  </script>
  

</body>


</html>
