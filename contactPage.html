<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinly - İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="navbar-placeholder"></div>
    <script src="navbarLoader.js"></script>

    
    <div class="container-cs">
      <h1>Bizimle İletişime Geçin</h1>
      <p>Her türlü soru, öneri veya görüşleriniz için aşağıdaki formu doldurarak bize ulaşabilirsiniz.</p>
    
        <h4>📍 Adres</h4>
        <p>Turgutlu, 12345 Sokak No:12<br>Manisa / Türkiye</p>
    
        <h4>📞 Telefon</h4>
        <p><a href="tel:+905551112233">+90 555 111 22 33</a></p>
    
        <h4>✉️ E-posta</h4>
        <p><a href="mailto:info@cabinly">info@cabinly.com</a></p>
    
        <div class="social-icons">
          <a href="https://facebook.com/cabinly" target="_blank"><img class="icons" src="icons/facebook.png" alt="facebook"></i></a>
          <a href="https://instagram.com/cabinly" target="_blank"><img class="icons" src="icons/instagram.png" alt="Instagram"></a>
          <a href="https://twitter.com/cabinly" target="_blank"> <img class="icons" src="icons/twitter.png" alt="X"></a>
          
        </div>
  
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Adınız</label>
          <input type="text" id="name" name="name" required />
        </div>
  
        <div class="form-group">
          <label for="email">E-posta</label>
          <input type="email" id="email" name="email" required />
        </div>
  
        <div class="form-group">
          <label for="subject">Konu</label>
          <input type="text" id="subject" name="subject" required />
        </div>
  
        <div class="form-group">
          <label for="message">Mesajınız</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
  
        <button class="login-btn" type="submit">Gönder</button>
      </form>
  
      
    </div>


    <div id="footer-container" class="footer-custom"></div>
    <script src="footerLoader.js"></script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
