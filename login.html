<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cabinly - Giriş Yap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div> 
    <script src="navbarLoader.js"></script>

    <!-- Login Container -->
    <div class="login-container">
        <h2>Giriş Yap</h2>
        <form>
          <input type="email" class="form-control" placeholder="E-Posta adresiniz" required>
          <input type="password" class="form-control" placeholder="Şifreniz" required>
          <button type="submit" class="btn-login">Giriş Yap</button>
        </form>
        <div class="form-text">
          <a href="#">Şifremi unuttum?</a><br>
          <a href="register.html">Bir hesabınız yok mu? Kayıt ol</a>
        </div>
      </div>

    <!-- Footer Placeholder -->
    <div id="footer-container" class="footer-custom"></div>
    <script src="footerLoader.js"></script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
