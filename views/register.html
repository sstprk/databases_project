<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TurizmMarka - Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>
    <script src="navbarLoader.js"></script>

    <div class="login-container">
        <h2>Kayıt Ol</h2>
        <form id="regForm">
            <input name="regName" type="text" class="form-control" placeholder="Adınız" required>
            <input name="regLastName" type="text" class="form-control" placeholder="Soyadınız" required>
            <input name="regEmail" class="form-control" placeholder="E-Posta adresiniz" required>
            <input name="regPassword" type="password" class="form-control" placeholder="Şifreniz" required>
            
            <!-- Host olup olmadığını belirten checkbox ekledik -->
            <div class="form-check">
                <input name="isHost" type="checkbox" class="form-check-input" id="hostCheckbox">
                <label class="form-check-label" for="hostCheckbox">Host olarak kayıt oluyorum</label>
            </div>
            
            <button id="btnSub" type="submit" class="btn-login">Kayıt Ol</button>
        </form>
        
        <script>
            document.getElementById("regForm").addEventListener("submit", function(event){
                // Form elemanlarını al
                var name = document.getElementsByName("regName")[0].value;
                var lastName = document.getElementsByName("regLastName")[0].value;
                var email = document.getElementsByName("regEmail")[0].value;
                var password = document.getElementsByName("regPassword")[0].value;
    
                // Eğer tüm alanlar doluysa yönlendirme yap
                if(name && lastName && email && password){
                    window.location.href = "login.html";  // Yönlendirme işlemi
                } else {
                    alert("Lütfen tüm alanları doldurun.");
                    event.preventDefault(); // Formun gönderilmesini engelle
                }
            });
        </script>
    </div>
    
    
    

    <!-- Footer Placeholder -->
    <div id="footer-container" class="footer-custom"></div>
    <script src="footerLoader.js"></script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
