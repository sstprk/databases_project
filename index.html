<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cabinly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="navbar-placeholder"></div>
  <script src="navbarLoader.js"></script>

  <div class="search-container">
    <h2>Rezervasyon Yapın</h2>
    <div class="search-form">
      <!-- Arama Kutusu -->
      <input type="text" placeholder="İstediğiniz şehri veya bölgeyi aratınız">

      <!-- Kişi Sayısı -->
      <select>
        <option value="1">1 Kişi</option>
        <option value="2">2 Kişi</option>
        <option value="3">3 Kişi</option>
        <option value="4">4 Kişi</option>
        <option value="5">5+ Kişi</option>
      </select>

      <!-- Gidiş ve Dönüş Tarihi -->
      <div class="dates-container">
        <input type="date">
        <input type="date">
      </div>

      <!-- Rezervasyon Butonu -->
      <button>Arama Yap</button>
    </div>
  </div>



  <div id="carouselExampleControls" class="carousel-container carousel slide" data-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item">
        <img src="Images/photo-1628394029761-acc83a2a08a6.avif" class="d-block w-100" alt="...">
      </div>
      <div class="carousel-item active">
        <img src="Images/photo-1628394029749-ea3dcce4caa6.avif" class="d-block w-100" alt="...">
      </div>
      <div class="carousel-item">
        <img src="Images/photo-1601312044126-06d550c15beb.avif" class="d-block w-100" alt="...">
      </div>
      
    </div>
    <button class="carousel-control-prev" type="button" data-target="#carouselExampleControls" data-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="sr-only">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-target="#carouselExampleControls" data-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="sr-only">Next</span>
    </button>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

  <script>
    $(document).ready(function () {
      // Next butonuna tıklama işlemi
      $('.carousel-control-next').click(function () {
        $('#carouselExampleControls').carousel('next');
      });

      // Prev butonuna tıklama işlemi
      $('.carousel-control-prev').click(function () {
        $('#carouselExampleControls').carousel('prev');
      });
    });
  </script>


  <div id="footer-container" class="footer-custom"></div>
  <script src="footerLoader.js"></script>
  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
