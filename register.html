<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TurizmMarka - Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>
    <script src="navbarLoader.js"></script>

    <!-- Login Container -->
    <div class="login-container">
        <h2>Kayıt Ol</h2>
        <form>
            <input name="regName" type="text" class="form-control" placeholder="Adınız" required>
            <input name="regLastName" type="text" class="form-control" placeholder="Soyadınız" required>
            <input name="regEmail" class="form-control" placeholder="E-Posta adresiniz" required>
            <input name="regPassword" type="password" class="form-control" placeholder="Şifreniz" required>
            <button type="submit" class="btn-login" onclick="submitForm">Kayıt Ol</button>
        </form>
        <script>
            function submitForm() {
                const form = document.getElementById('myForm');

                // Burada formun geçerli olup olmadığını kontrol ediyoruz
                if (form.checkValidity()) {
                    // Veriyi göndermeyi simüle ediyoruz (mesela fetch veya başka bir yöntemle)
                    // Sonrasında yönlendirme işlemini gerçekleştiriyoruz
                    window.location.href = "success.html"; // Veri gönderildikten sonra yönlendir
                } else {
                    // Hatalı giriş varsa, tarayıcıdaki yerleşik validasyonu tetikliyoruz
                    form.reportValidity();
                }
            }

        </script>

        
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-container" class="footer-custom"></div>
    <script src="footerLoader.js"></script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
